  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Spinwheel Embedded Debt Solutions
  ServiceCategory: Financial Services
  ProviderName: Spinwheel
