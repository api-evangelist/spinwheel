description: >-
  FinOps view of Spinwheel spend. Spinwheel is billed through a sales-led
  partner agreement rather than a public price list, so cost is driven by the
  set of enabled modules (user connect, credit data / debt profile, liability
  refresh, payments) plus usage-based components such as per credit-report pull,
  per liability refresh, and per payment / transaction. Specific rates are not
  published and are not reconciled here; the meters below describe the cost
  drivers to track once a contract is in place.
notes: >-
  Reconcile module bundling and per-unit rates with Spinwheel sales. Credit
  report pulls (Equifax) and payment transactions are the primary variable cost
  drivers; control them by gating refresh frequency and debt-profile pulls.
sources:
- https://spinwheel.io/
- https://docs.spinwheel.io/docs/getting-started-1
