meters:
- name: credit_report_pulls
  description: Equifax-backed debt profile / credit report pulls, a primary variable cost driver.
  unit: requests
  aggregation: sum
  dimensions:
  - partner
  - user
- name: liability_refreshes
  description: Real-time liability refresh requests (balances, rates, payoff quotes).
  unit: requests
  aggregation: sum
  dimensions:
  - partner
  - user
- name: refresh_subscriptions
  description: Recurring debt-profile refresh subscriptions kept active per user.
  unit: subscriptions
  aggregation: sum
  dimensions:
  - partner
  - user
- name: payment_transactions
  description: Bank-account-funded payment requests and transactions originated.
  unit: transactions
  aggregation: sum
  dimensions:
  - partner
  - user
- name: connected_users
  description: Users connected via SMS, KBA, phone, or network token.
  unit: users
  aggregation: sum
  dimensions:
  - partner
principles:
- name: Visibility
  description: Track credit report pulls, refreshes, and payment transactions per partner key and per user.
- name: Allocation
  description: Tag usage to the enabled module (credit data, liabilities, payments) and map to internal cost centers.
- name: Optimization
  description: Gate debt-profile pull and refresh frequency; rely on webhooks instead of aggressive polling; only enable the modules in use.
- name: Accountability
  description: Assign owners per integrated workflow; review pull and transaction volume monthly against the contracted commitment.
